<div class="edit-trip-container">
  <button class="back-btn" (click)="cancel()">← חזור</button>
  
  <div class="edit-trip-card">
    <h1 class="edit-title">עריכת טיול</h1>
    
    <form [formGroup]="form" (ngSubmit)="saveTrip()" class="edit-form">
      <div class="form-group">
        <label for="name">:שם הטיול</label>
        <input type="text" id="name" formControlName="name" [class.error]="name.invalid && name.touched" required>
        @if(name.invalid && name.touched) {
          <small class="error-message">Trip name is required</small>
        }
      </div>

      <div class="form-group">
        <label for="destination">:יעד</label>
        <input type="text" id="destination" formControlName="destination" [class.error]="destination.invalid && destination.touched" required>
        @if(destination.invalid && destination.touched) {
          <small class="error-message">Destination is required</small>
        }
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">:תאריך התחלה</label>
          <input type="date" id="startDate" formControlName="startDate" required>
        </div>

        <div class="form-group">
          <label for="endDate">:תאריך סיום</label>
          <input type="date" id="endDate" formControlName="endDate" required>
        </div>
      </div>

      <div class="form-group">
        <label for="price">:מחיר</label>
        <input type="number" id="price" formControlName="price" min="0" required>
      </div>

      <div class="form-group">
        <label for="image">:תמונה (URL)</label>
        <input type="text" id="image" formControlName="image" required>
      </div>

      <div class="form-group">
        <label for="description">:תיאור</label>
        <textarea id="description" formControlName="description" rows="5" required></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="save-btn">שמור שינויים</button>
        <button type="button" class="cancel-btn" (click)="cancel()">ביטול</button>
      </div>
    </form>
  </div>
</div>
