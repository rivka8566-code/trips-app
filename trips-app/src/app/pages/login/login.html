<div class="login-container">
  <div class="login-card">
    <h2>🌿 התחברות לעולם הטיולים</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">שם משתמש</label>
        <input type="text" id="username" formControlName="name" required>
        @if(nameInvalid)
        {
        <small class="error-messages">שם המשתמש לא תקין</small>
        }
      </div>
      <div class="form-group">
        <label for="password">סיסמה</label>
        <input type="password" id="password" formControlName="password" required>
        @if(passwordInvalid)
        {
        <small class="error-messages">הסיסמה לא תקינה</small>
        }
      </div>
      <button type="submit" class="login-btn">כניסה</button>
      <p class="register-link">עדיין לא רשום? <a href="/register">הירשם כעת</a></p>
    </form>
  </div>
</div>
