<div class="all-trips-container">
  <div class="page-header">
    <h2>🌍 כל הטיולים</h2>
    <button class="add-trip-btn">+ הוסף טיול חדש</button>
  </div>

  <div class="filters-section">
    <div class="filter-group">
      <label>סינון לפי יעד:</label>
      <input type="text" placeholder="חפש יעד...">
    </div>
    <div class="filter-group">
      <label>סינון לפי תאריך:</label>
      <input type="date">
    </div>
    <div class="filter-group">
      <label>סינון לפי מחיר:</label>
      <input type="number" placeholder="מחיר מקסימלי">
    </div>
    <div class="filter-group">
      <label>מיון לפי:</label>
      <select>
        <option>תאריך</option>
        <option>מחיר</option>
        <option>יעד</option>
      </select>
    </div>
  </div>

</div>
