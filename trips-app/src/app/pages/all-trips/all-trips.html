<div class="all-trips-container">
  <div class="page-header">
    <h2>All Trips</h2>
    @if(isAdmin()) {
      <button class="add-trip-btn" (click)="addTrip()">+ Add New Trip</button>
    }
  </div>

  <div class="filters-section">
    <div class="filter-group">
      <label>Destination:</label>
      <input type="text" placeholder="Search destination..." [(ngModel)]="filters.destination" (ngModelChange)="applyFilters()">
    </div>
    <div class="filter-group">
      <label>From date:</label>
      <input type="date" [(ngModel)]="filters.startDate" (ngModelChange)="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Max price:</label>
      <input type="number" placeholder="Max price" [(ngModel)]="filters.maxPrice" (ngModelChange)="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Sort by:</label>
      <select [(ngModel)]="filters.sortBy" (ngModelChange)="applyFilters()">
        <option value="startDate">Date</option>
        <option value="price">Price</option>
        <option value="destination">Destination</option>
      </select>
    </div>
    <button class="reset-btn" (click)="resetFilters()">Reset</button>
  </div>

  <div>
    @if(trips().length === 0) {
      <p class="no-trips">No trips available for you at the moment.</p>
    } @else {
      <app-trip-list [isAdmin]="isAdmin()" [trips]="trips()" (tripDeleted)="loadTrips()"></app-trip-list>
    }
  </div>
</div>
