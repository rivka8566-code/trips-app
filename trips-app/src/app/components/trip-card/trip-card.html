@if(trip(); as tripData) {
  <div class="trip-card">
    <img [src]="tripData.image" [alt]="tripData.name" class="trip-image" (click)="viewTripDetails()" style="cursor: pointer;">
    <div class="trip-info">
      <h3>{{ tripData.name }}</h3>
      <p class="destination">{{ tripData.destination }}</p>
      @if(isAdmin() && inAllTrips()) {
        <div class="admin-actions">
          <button class="edit-btn" (click)="editTrip()" [disabled]="hasBookings()">Edit</button>
          <button class="delete-btn" (click)="openDeleteDialog()" [disabled]="hasBookings()">Delete</button>
        </div>
      }
    </div>
  </div>
}

@if(showDeleteDialog()) {
  <app-confirm-dialog (onConfirm)="confirmDelete()" (onCancel)="closeDeleteDialog()" />
}
