<header class="header">

    <h1>🏔️ עולם הטיולים</h1>
    <div class="user-section">
      <span class="username">שלום, [שם משתמש]</span>
      <nav class="nav-buttons">
        <button class="nav-btn" [class.active]="activeTab === 'all-trips'" (click)="allTrips()">All Trips</button>
        <button class="nav-btn" [class.active]="activeTab === 'my-trips'" (click)="myTrips()">My Trips</button>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </nav>
    </div>
  </div>
</header>
